<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1020" />
    <title>Happy Birthday ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="confetti" aria-hidden="true"></canvas>
    <div class="bg" aria-hidden="true"></div>

    <main class="wrap">
      <section class="card" aria-label="Birthday wish">
        <header class="top">
          <div class="badge">Happy Birthday</div>
          <h1 class="title" id="title">My Adoma</h1>
          <p class="subtitle" id="subtitle">Tap to open your surprise</p>
        </header>

        <div class="stage" aria-hidden="true">
          <div class="envelope" id="envelope">
            <div class="env-back"></div>
            <div class="env-front"></div>
            <div class="env-flap"></div>
            <div class="letter">
              <div class="letter-inner">
                <div class="letter-title">For you</div>
                <div class="letter-line"></div>
                <div class="letter-heart">❤</div>
              </div>
            </div>
          </div>
          <button class="cta" id="openBtn" type="button">Open</button>
        </div>

        <section class="content" id="content" aria-label="Message and photos">
          <div class="message">
            <h2 class="script" id="headline">Happy Birthday, Adoma</h2>
            <p class="body" id="msg"></p>
            <div class="from" id="fromLine"></div>
          </div>

          <div class="gallery" aria-label="Photo gallery">
            <div class="frame">
              <img id="photo" alt="A photo" />
              <div class="shine" aria-hidden="true"></div>
            </div>
            <div class="thumbs" id="thumbs" aria-label="Thumbnails"></div>
          </div>
        </section>
      </section>
    </main>

    <script id="imagesManifest" type="application/json">
      ["IMG_0760.JPG","IMG_0769.JPG","IMG_0771.JPG","IMG_0772.JPG","IMG_0789.JPG"]
    </script>
    <script src="./script.js" defer></script>
  </body>
</html>
